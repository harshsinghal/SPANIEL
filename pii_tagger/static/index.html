<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPANIEL — free-form PII tagger</title>
<style>
  :root {
    --ground: #f4f6f8; --surface: #ffffff; --ink: #1c2128; --muted: #5c6675;
    --line: #e1e5ea; --accent: #33608c; --accent-ink: #ffffff; --code-bg: #eef1f4;
    --ok: #2c7a39; --bad: #b3372e;
    --h0:210; --h1:150; --h2:25; --h3:280; --h4:340; --h5:190;
    --h6:85; --h7:250; --h8:45; --h9:0; --h10:120; --h11:310;
    --mark-s: 80%; --mark-l: 90%; --mark-text-s: 60%; --mark-text-l: 26%;
    --mark-tag-s: 45%; --mark-tag-l: 38%;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #14171c; --surface: #1c2127; --ink: #e6eaef; --muted: #97a1ae;
      --line: #2b323c; --accent: #7aa7d4; --accent-ink: #10151b; --code-bg: #161a20;
      --ok: #6cc47a; --bad: #e07a72;
      --mark-s: 35%; --mark-l: 22%; --mark-text-s: 65%; --mark-text-l: 78%;
      --mark-tag-s: 40%; --mark-tag-l: 62%;
    }
  }
  * { box-sizing: border-box; }
  body { background: var(--ground); color: var(--ink); margin: 0;
         font: 15px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 30px 20px 80px; }
  h1 { font-size: 20px; font-weight: 650; margin: 0 0 4px; letter-spacing: -0.01em; }
  p.sub { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
  label { display: block; font-size: 11px; text-transform: uppercase;
          letter-spacing: 0.07em; color: var(--muted); font-weight: 650; margin: 0 0 6px; }
  textarea, input[type=text] {
    width: 100%; background: var(--surface); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px;
    font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  textarea { min-height: 170px; resize: vertical; }
  textarea:focus, input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .row { margin-bottom: 16px; }
  .actions { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  button#go {
    appearance: none; border: none; background: var(--accent); color: var(--accent-ink);
    font: inherit; font-size: 14px; font-weight: 600; border-radius: 8px;
    padding: 9px 26px; cursor: pointer;
  }
  button#go:disabled { opacity: 0.55; cursor: default; }
  .status { font-size: 13px; color: var(--muted); }
  .status .ok { color: var(--ok); font-weight: 600; }
  .status .bad { color: var(--bad); font-weight: 600; }

  .panel { background: var(--surface); border: 1px solid var(--line);
           border-radius: 10px; padding: 16px 18px; }
  .panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
              color: var(--muted); font-weight: 650; margin: 0 0 12px; }
  #output { font: 13.5px/1.8 ui-monospace, SFMono-Regular, Menlo, monospace;
            white-space: pre-wrap; overflow-wrap: anywhere; min-height: 60px; }
  #output.empty { color: var(--muted); font-family: inherit; }
  mark { border-radius: 4px; padding: 1px 3px 1px 4px;
         background: hsl(var(--h) var(--mark-s) var(--mark-l));
         color: hsl(var(--h) var(--mark-text-s) var(--mark-text-l)); }
  mark i { font-style: normal; font-size: 9.5px; font-weight: 650; margin-left: 4px;
           color: hsl(var(--h) var(--mark-tag-s) var(--mark-tag-l)); user-select: none; }
  .viewtoggle { float: right; appearance: none; border: 1px solid var(--line);
    background: none; color: var(--muted); border-radius: 6px; font: inherit;
    font-size: 11.5px; padding: 2px 9px; cursor: pointer; }
  .spinner { display: inline-block; width: 14px; height: 14px; vertical-align: -2px;
    border: 2px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spinner { animation-duration: 2s; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>SPANIEL 🐕</h1>
  <p class="sub">SPAN Identification from Everyday Language — Qwen3-0.6B running locally with constrained decoding. Free-form entity types: try ones it never saw in training.</p>

  <div class="row">
    <label for="example">Load an example</label>
    <select id="example" style="width:100%;background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font:13px ui-monospace,SFMono-Regular,Menlo,monospace;margin-bottom:14px">
      <option value="">— pick one of 15 preloaded examples, or write your own below —</option>
    </select>
    <label for="text">Text</label>
    <textarea id="text" placeholder="Paste or write the text to scan…">Patient Brian Weaver (MRN BX-40912) called from +1 415 555 0132 about his appointment on 2026-07-14 at 3:30pm. His insurance ID is HP-99801-B and he works as a marine electrician at Bayside Dry Dock LLC.</textarea>
  </div>
  <div class="row">
    <label for="entities">Entity types (comma separated)</label>
    <input type="text" id="entities"
      value="person name, patient mrn, phone number, date, time, insurance id, occupation, company name">
  </div>
  <div class="actions">
    <button id="go">Tag entities</button>
    <span class="status" id="status"></span>
  </div>

  <div class="panel">
    <h2>Output <button class="viewtoggle" id="viewtoggle" hidden>show raw</button></h2>
    <div id="output" class="empty">Tagged text appears here.</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

fetch("/static/examples.json").then(r => r.json()).then(ex => {
  window._examples = ex;
  ex.forEach((e, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = e.title;
    $("example").appendChild(o);
  });
});
$("example") && ($("example").onchange = () => {
  const i = $("example").value;
  if (i === "") return;
  const e = window._examples[i];
  $("text").value = e.text;
  $("entities").value = e.entities;
  $("status").textContent = "";
  $("output").className = "empty"; $("output").textContent = "Tagged text appears here.";
  $("viewtoggle").hidden = true;
});
let last = null, raw = false;

function esc(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

function render() {
  const out = $("output");
  out.classList.remove("empty");
  if (raw) { out.textContent = last.tagged; return; }
  out.innerHTML = "";
  const names = last.entities;
  const re = new RegExp(`<(${names.map(esc).join("|")})>([\\s\\S]*?)</\\1>`, "g");
  const hue = {}; names.forEach((n, i) => hue[n] = i % 12);
  let pos = 0, m;
  while ((m = re.exec(last.tagged)) !== null) {
    if (m.index > pos) out.appendChild(document.createTextNode(last.tagged.slice(pos, m.index)));
    const mark = document.createElement("mark");
    mark.style.setProperty("--h", `var(--h${hue[m[1]]})`);
    mark.appendChild(document.createTextNode(m[2]));
    const tag = document.createElement("i");
    tag.textContent = m[1];
    mark.appendChild(tag);
    out.appendChild(mark);
    pos = m.index + m[0].length;
  }
  if (pos < last.tagged.length) out.appendChild(document.createTextNode(last.tagged.slice(pos)));
}

$("viewtoggle").onclick = () => {
  raw = !raw;
  $("viewtoggle").textContent = raw ? "show highlighted" : "show raw";
  render();
};

$("go").onclick = async () => {
  const text = $("text").value;
  const entities = $("entities").value.split(",").map(s => s.trim()).filter(Boolean);
  if (!text.trim() || !entities.length) {
    $("status").textContent = "Need text and at least one entity type."; return;
  }
  $("go").disabled = true;
  $("status").innerHTML = '<span class="spinner"></span> running locally…';
  try {
    const r = await fetch("/api/tag", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, entities }),
    });
    const d = await r.json();
    if (d.error) { $("status").textContent = d.error; return; }
    last = d;
    $("viewtoggle").hidden = false;
    render();
    $("status").innerHTML =
      `${d.seconds}s · ${d.new_tokens} tokens · ` +
      (d.faithful ? '<span class="ok">copy-faithful ✓</span>'
                  : '<span class="bad">⚠ output altered the text</span>');
  } catch (e) {
    $("status").textContent = "Request failed: " + e.message;
  } finally {
    $("go").disabled = false;
  }
};
</script>
</body>
</html>
